<immopro-auth-card
  title="Créer un compte"
  subtitle="Commencez à gérer votre patrimoine aujourd'hui"
>
  @if (error()) {
    <div class="alert alert-error">
      {{ error() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">
    <immopro-input
      id="name"
      label="Nom complet"
      formControlName="name"
      placeholder="Jean Dupont"
      [error]="(submitted() || name?.touched || name?.dirty) && name?.invalid ? (name?.hasError('required') ? 'Le nom est requis' : 'Minimum 3 caractères') : null"
    ></immopro-input>

    <immopro-input
      id="email"
      label="Email"
      type="email"
      formControlName="email"
      placeholder="jean@exemple.com"
      [error]="(submitted() || email?.touched || email?.dirty) && email?.invalid ? (email?.hasError('required') ? 'L\'email est requis' : 'Email invalide') : null"
    ></immopro-input>

    <immopro-input
      id="password"
      label="Mot de passe"
      type="password"
      formControlName="password"
      placeholder="Minimum 8 caractères"
      [error]="(submitted() || password?.touched || password?.dirty) && password?.invalid ? (password?.hasError('required') ? 'Le mot de passe est requis' : 'Minimum 8 caractères') : null"
    ></immopro-input>

    <immopro-input
      id="password_confirmation"
      label="Confirmer le mot de passe"
      type="password"
      formControlName="password_confirmation"
      placeholder="Confirmer votre mot de passe"
      [error]="(submitted() || passwordConfirmation?.touched || passwordConfirmation?.dirty) && passwordConfirmation?.invalid ? (passwordConfirmation?.hasError('required') ? 'La confirmation est requise' : 'Les mots de passe ne correspondent pas') : null"
    ></immopro-input>

    <immopro-button
      type="submit"
      [loading]="loading()"
      [disabled]="loading()"
    >
      Créer mon compte
    </immopro-button>
  </form>

  <div footer>
    Déjà inscrit? <a routerLink="/login">Se connecter</a>
  </div>
</immopro-auth-card>
