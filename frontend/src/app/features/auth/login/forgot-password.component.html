<immopro-auth-card
  title="Mot de passe oublié"
  subtitle="Saisissez votre email pour recevoir un lien de réinitialisation"
>
  @if (error()) {
    <div class="alert alert-error">
      {{ error() }}
    </div>
  }

  @if (successMessage()) {
    <div class="alert alert-success">
      {{ successMessage() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">
    <immopro-input
      id="email"
      label="Adresse Email"
      type="email"
      formControlName="email"
      placeholder="nom@exemple.com"
      [error]="submitted() && email?.invalid ? (email?.hasError('required') ? 'L\'email est requis' : 'Email invalide') : null"
    ></immopro-input>

    <immopro-button
      type="submit"
      [loading]="loading()"
      [disabled]="loading()"
    >
      Envoyer le lien
    </immopro-button>
  </form>

  <div footer>
    Retourner à la <a routerLink="/login">connexion</a>
  </div>
</immopro-auth-card>
