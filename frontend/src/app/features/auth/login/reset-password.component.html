<immopro-auth-card
  title="Nouveau mot de passe"
  subtitle="Définissez votre nouveau mot de passe de sécurité"
>
  @if (error()) {
    <div class="alert alert-error">
      {{ error() }}
    </div>
  }

  @if (successMessage()) {
    <div class="alert alert-success">
      {{ successMessage() }} Redirection vers la page de connexion...
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <immopro-input
      id="email"
      label="Adresse Email"
      type="email"
      formControlName="email"
      placeholder="nom@exemple.com"
      [error]="submitted() && email?.invalid ? (email?.hasError('required') ? 'L\'email est requis' : 'Email invalide') : null"
    ></immopro-input>

    <immopro-input
      id="password"
      label="Nouveau mot de passe"
      type="password"
      formControlName="password"
      placeholder="••••••••"
      [error]="submitted() && password?.invalid ? (password?.hasError('required') ? 'Le mot de passe est requis' : 'Le mot de passe doit faire au moins 8 caractères') : null"
    ></immopro-input>

    <immopro-input
      id="password_confirmation"
      label="Confirmer le mot de passe"
      type="password"
      formControlName="password_confirmation"
      placeholder="••••••••"
      [error]="submitted() && (passwordConfirmation?.invalid || form.hasError('mismatch')) ? (passwordConfirmation?.hasError('required') ? 'La confirmation est requise' : 'Les mots de passe ne correspondent pas') : null"
    ></immopro-input>

    <immopro-button
      type="submit"
      [loading]="loading()"
      [disabled]="loading() || !token()"
    >
      Réinitialiser le mot de passe
    </immopro-button>
  </form>

  <div footer>
    Retourner à la <a routerLink="/login">connexion</a>
  </div>
</immopro-auth-card>
