<div class="welcome-container">
  <div class="welcome-card">
    <h1>Bienvenue sur ImmoPro</h1>

    @if (isAuthenticated$ | async; as isAuth) {
      <div class="auth-status">
        @if (currentUser$ | async; as user) {
          <div class="user-info">
            <h2>Bonjour {{ user.name }}!</h2>
            <p class="email">{{ user.email }}</p>
            <p class="member-since">Membre depuis {{ user.created_at | date: 'longDate' }}</p>
          </div>
        }

        <button class="btn btn-logout" (click)="logout()">
          Se déconnecter
        </button>
      </div>
    } @else {
      <div class="not-authenticated">
        <p>Connectez-vous pour accéder à votre compte</p>
        <div class="button-group">
          <a routerLink="/login" class="btn btn-primary">Se connecter</a>
          <a routerLink="/register" class="btn btn-secondary">S'inscrire</a>
        </div>
      </div>
    }
  </div>
</div>
