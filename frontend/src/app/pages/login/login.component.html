<div class="login-container">
  <div class="login-card">
    <h1>Connexion</h1>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Votre email"
          [class.is-invalid]="submitted && email?.invalid"
        />
        <div *ngIf="submitted && email?.invalid" class="invalid-feedback">
          <span *ngIf="email?.hasError('required')">L'email est requis</span>
          <span *ngIf="email?.hasError('email')">Email invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Votre mot de passe"
          [class.is-invalid]="submitted && password?.invalid"
        />
        <div *ngIf="submitted && password?.invalid" class="invalid-feedback">
          <span *ngIf="password?.hasError('required')">Le mot de passe est requis</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading">Connexion en cours...</span>
      </button>
    </form>

    <p class="register-link">
      Pas encore inscrit? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
