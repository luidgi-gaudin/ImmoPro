<immopro-auth-card
  title="Bon retour"
  subtitle="Connectez-vous à votre espace ImmoPro"
>
  @if (error) {
    <div class="alert alert-error">
      {{ error }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <immopro-input
      id="email"
      label="Email"
      type="email"
      formControlName="email"
      placeholder="nom@exemple.com"
      [error]="submitted && email?.invalid ? (email?.hasError('required') ? 'L\'email est requis' : 'Email invalide') : null"
    ></immopro-input>

    <immopro-input
      id="password"
      label="Mot de passe"
      type="password"
      formControlName="password"
      placeholder="••••••••"
      [error]="submitted && password?.invalid ? 'Le mot de passe est requis' : null"
    ></immopro-input>

    <immopro-button
      type="submit"
      [loading]="loading"
      [disabled]="loading"
    >
      Se connecter
    </immopro-button>
  </form>

  <div footer>
    Pas encore membre? <a routerLink="/register">Créer un compte</a>
  </div>
</immopro-auth-card>
